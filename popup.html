<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CEChecker</title>
  <style>
    :root {
      --bg:          #FFFFFF;
      --surface:     #F8F8F8;
      --border:      #F0F0F0;
      --text:        #1A1A1A;
      --text2:       #555555;
      --text3:       #AAAAAA;
      --teal:        #F5A98A;
      --teal-light:  #FEF0E8;
      --teal-text:   #8B4513;
      --red:         #E05555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      max-height: 560px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      width: 34px; height: 34px; border-radius: 8px;
      background: #FEF0E8;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .brand-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .brand-name em { color: var(--teal); font-style: normal; }
    .brand-sub  { font-size: 11px; color: var(--text3); margin-top: 1px; }

    /* ── Scan ── */
    .scan-wrap {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #scan-btn {
      width: 100%; padding: 10px;
      background: var(--teal); color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s;
    }
    #scan-btn:hover    { background: #009982; }
    #scan-btn:disabled { background: #A8DDD8; cursor: not-allowed; }
    #scan-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Category filter ── */
    .filter-wrap {
      display: none; padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .filter-wrap.visible { display: block; }
    .filter-scroll {
      display: flex; gap: 5px; overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-scroll::-webkit-scrollbar { display: none; }

    .filter-pill {
      padding: 4px 10px; border-radius: 12px; flex-shrink: 0;
      font-size: 11px; font-weight: 600;
      border: 1.5px solid var(--border);
      color: var(--text3); background: transparent;
      cursor: pointer; transition: all 0.12s; white-space: nowrap;
    }
    .filter-pill:hover  { border-color: var(--teal); color: var(--teal); }
    .filter-pill.active {
      background: #FEF0E8;
      border-color: var(--teal);
      color: var(--teal-text);
    }

    /* ── Summary ── */
    .summary {
      display: none; padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .summary.visible { display: flex; }
    .summary-count { font-size: 12px; font-weight: 700; color: var(--text); }
    .summary-count em { color: var(--teal); font-style: normal; }
    .summary-meta  { font-size: 11px; color: var(--text3); }

    /* ── States ── */
    .empty-state {
      padding: 36px 20px; text-align: center;
      color: var(--text3); font-size: 13px; line-height: 1.7;
    }
    .empty-icon {
      width: 40px; height: 40px; border: 2px solid var(--border);
      border-radius: 50%; margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
    }

    .loading {
      display: none; padding: 36px 20px;
      text-align: center; color: var(--text3); font-size: 13px;
    }
    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--teal); border-radius: 50%;
      margin: 0 auto 14px; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-results {
      display: none; padding: 28px 20px;
      text-align: center; color: var(--text3); font-size: 13px; line-height: 1.7;
    }
    .no-results.visible { display: block; }

    /* ── Results ── */
    .results { display: none; overflow-y: auto; flex: 1; }
    .results.visible { display: block; }

    .cat-group { border-bottom: 1px solid var(--border); }
    .cat-header {
      padding: 7px 16px;
      background: var(--surface);
      font-size: 10px; font-weight: 700; color: var(--teal);
      text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }

    .term-row {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .term-row:last-child { border-bottom: none; }
    .term-row:hover { background: var(--surface); }

    .term-top {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
    }
    .term-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .term-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .term-count {
      font-size: 10px; font-weight: 800;
      background: #FEF0E8; color: var(--teal-text);
      padding: 2px 7px; border-radius: 10px; flex-shrink: 0;
    }

    .jump-btn {
      flex-shrink: 0; padding: 4px 9px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      color: var(--text3); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .jump-btn:hover { border-color: var(--teal); color: var(--teal); }
    .jump-btn.active { border-color: var(--teal); color: var(--teal); background: #FEF0E8; }

    .term-def {
      font-size: 11px; color: var(--text3);
      margin-top: 3px; line-height: 1.5;
    }

    .term-excerpt {
      display: none; margin-top: 8px; padding: 8px 10px;
      background: var(--surface); border-radius: 6px;
      font-size: 11px; color: var(--text2); line-height: 1.6;
      border-left: 2px solid var(--teal);
    }
    .term-excerpt.open { display: block; }
    .term-excerpt mark {
      background: transparent; color: var(--teal); font-weight: 700;
    }
    .excerpt-hint { font-size: 10px; color: var(--text3); margin-top: 4px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F5A98A" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="M16.5 16.5L21 21"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">CE<em>Checker</em></div>
      <div class="brand-sub">Circular economy scanner</div>
    </div>
  </header>

  <div class="scan-wrap">
    <button id="scan-btn">
      <svg viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Scan this page
    </button>
  </div>

  <div class="filter-wrap" id="filter-wrap">
    <div class="filter-scroll" id="filter-pills"></div>
  </div>

  <div class="summary" id="summary">
    <div class="summary-count" id="summary-count"></div>
    <div class="summary-meta"  id="summary-meta"></div>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="empty-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12.5 12.5L15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    Hit scan to check this page for<br>circular economy terminology.
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Scanning page…
  </div>

  <div class="no-results" id="no-results">No circular economy terms found<br>on this page.</div>
  <div class="results"   id="results"></div>

  <script src="popup.js"></script>
</body>
</html>
